name: CI/CD Pipeline for Scottish Gallery

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # FÁZE 1: TESTOVÁNÍ A KONTROLA
  test_and_lint:
    name: Lint & Test
    runs-on: ubuntu-latest
    
    # NOVÉ: Říkáme robotovi, ať si pro testy nastartuje vlastní databázi
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Lint code with Ruff
        run: ruff check . --output-format=github
        
      - name: Run unit tests
        # NOVÉ: Předáme Djangu adresu té naší dočasné databáze
        env:
          SECRET_KEY: 'test-secret-key-123'
          DATABASE_URL: 'postgres://testuser:testpassword@localhost:5432/testdb'
        run: python manage.py test

  # FÁZE 2: NASAZENÍ (Zůstává beze změny)
  deploy:
    name: Deploy to Fly.io
    needs: test_and_lint
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master
        
      - name: Deploy to Fly.io
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}