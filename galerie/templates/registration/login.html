{% extends 'galerie/base.html' %}

{% block content %}
<div class="form-container">
    <h2 style="text-align: center; margin-bottom: 20px; font-family: 'Playfair Display', serif;">Log In</h2>
    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            <label for="{{ form.username.id_for_label }}">Username:</label>
            {{ form.username }}
        </div>
        <div class="form-group">
            <label for="{{ form.password.id_for_label }}">Password:</label>
            {{ form.password }}
        </div>
        {% if form.errors %}
        <div style="color: red; margin-bottom: 15px;">
            <p>Invalid login credentials. Please try again.</p>
        </div>
        {% endif %}
        <button type="submit" class="btn-primary" style="width: 100%;">Log In</button>
    </form>
</div>
{% endblock %}
