{% extends 'galerie/base.html' %}
{% load static %}

{% block extra_css %}
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />
    
    <style>
        /* Unikátní CSS pouze pro vnitřek mapy (piny a popupy) */
        .custom-pin { background: transparent; border: none; }
        .pin-body {
            background-color: var(--pin-color);
            width: 30px; height: 30px;
            border-radius: 50% 50% 50% 0;
            transform: rotate(-45deg);
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            border: 2px solid white;
        }
        .pin-body i { transform: rotate(45deg); color: white; font-size: 14px; }
        .leaflet-popup-content { width: 250px !important; text-align: center; }
        #map { z-index: 10; } /* Prevence proti překrývání modalu */
    </style>
{% endblock %}

{% block content %}
<div class="flex flex-col h-[calc(100vh-68px)] w-full relative">
    
    <div class="absolute top-4 left-1/2 -translate-x-1/2 z-[1000] flex gap-3 w-[95%] md:w-auto justify-center">

        <div class="relative dropdown-container">
            <button onclick="toggleDropdown('catDropdown')" class="px-5 py-2.5 bg-white dark:bg-darksurface rounded-full shadow-lg font-semibold text-gray-800 dark:text-gray-200 flex items-center gap-2 hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors border border-gray-100 dark:border-gray-700">
                <i class="fa-solid fa-filter text-accent"></i>
                <span id="activeCatLabel">All Categories</span>
                <i class="fa-solid fa-chevron-down text-xs ml-1 text-gray-400"></i>
            </button>
            <div id="catDropdown" class="hidden absolute top-full left-0 mt-2 w-48 bg-white dark:bg-darksurface rounded-xl shadow-xl border border-gray-100 dark:border-gray-700 overflow-hidden flex flex-col">
                <button class="cat-filter-btn px-4 py-3 text-left hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors text-sm font-semibold border-l-4 border-accent bg-gray-50 dark:bg-gray-800" data-filter="all" data-name="All Categories">🌍 All Categories</button>
                <button class="cat-filter-btn px-4 py-3 text-left hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors text-sm font-semibold border-l-4 border-transparent" data-filter="nature" data-name="Nature">🌲 Nature</button>
                <button class="cat-filter-btn px-4 py-3 text-left hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors text-sm font-semibold border-l-4 border-transparent" data-filter="architecture" data-name="Architecture">🏰 Architecture</button>
                <button class="cat-filter-btn px-4 py-3 text-left hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors text-sm font-semibold border-l-4 border-transparent" data-filter="animals" data-name="Animals">🐾 Animals</button>
                <button class="cat-filter-btn px-4 py-3 text-left hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors text-sm font-semibold border-l-4 border-transparent" data-filter="people" data-name="People">❤️ People</button>
                <button class="cat-filter-btn px-4 py-3 text-left hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors text-sm font-semibold border-l-4 border-transparent" data-filter="fun" data-name="Fun">🍻 Fun</button>
            </div>
        </div>

        {% if available_years %}
        <div class="relative dropdown-container">
            <button onclick="toggleDropdown('yearDropdown')" class="px-5 py-2.5 bg-white dark:bg-darksurface rounded-full shadow-lg font-semibold text-gray-800 dark:text-gray-200 flex items-center gap-2 hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors border border-gray-100 dark:border-gray-700">
                <i class="fa-regular fa-calendar text-brand dark:text-blue-400"></i>
                <span id="activeYearLabel">All Time</span>
                <i class="fa-solid fa-chevron-down text-xs ml-1 text-gray-400"></i>
            </button>
            <div id="yearDropdown" class="hidden absolute top-full right-0 mt-2 w-36 bg-white dark:bg-darksurface rounded-xl shadow-xl border border-gray-100 dark:border-gray-700 overflow-hidden flex flex-col max-h-64 overflow-y-auto">
                <button class="year-filter-btn px-4 py-3 text-left hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors text-sm font-semibold border-l-4 border-brand dark:border-blue-400 bg-gray-50 dark:bg-gray-800" data-year="all">All Time</button>
                {% for year in available_years %}
                    <button class="year-filter-btn px-4 py-3 text-left hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors text-sm font-semibold border-l-4 border-transparent" data-year="{{ year }}">{{ year }}</button>
                {% endfor %}
            </div>
        </div>
        {% endif %}

    </div>

    <div id="map" class="w-full h-full"></div>
</div>

<div id="photoModal" class="fixed inset-0 z-[2000] hidden bg-black/90 backdrop-blur-sm items-center justify-center">
    <button onclick="closeModal()" class="absolute top-6 right-8 text-white text-4xl hover:text-accent transition-colors">&times;</button>
    
    <button onclick="prevPhoto(event)" class="absolute left-4 md:left-12 text-white text-3xl md:text-5xl hover:text-accent p-4 transition-colors">&#10094;</button>
    
    <div class="flex flex-col items-center p-4 max-w-5xl w-full mt-10">
        <img id="modalImg" class="max-h-[70vh] max-w-full rounded-xl shadow-2xl object-contain">
        <div id="modalCaption" class="mt-6 text-center text-white p-4 max-w-2xl bg-black/50 rounded-lg backdrop-blur-md"></div>
    </div>
    
    <button onclick="nextPhoto(event)" class="absolute right-4 md:right-12 text-white text-3xl md:text-5xl hover:text-accent p-4 transition-colors">&#10095;</button>
</div>

<script id="photos-data" type="application/json">
    {{ photos_json|safe }}
</script>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>

<script>
    // Parsování dat
    const photosData = JSON.parse(document.getElementById('photos-data').textContent);
    
    // Konfigurace pinu
    const catConfig = {
        'nature': { color: '#27ae60', icon: 'fa-tree' },
        'architecture': { color: '#8e44ad', icon: 'fa-chess-rook' },
        'animals': { color: '#d35400', icon: 'fa-paw' },
        'people': { color: '#2980b9', icon: 'fa-user' },
        'fun': { color: '#f39c12', icon: 'fa-beer-mug-empty' },
        'default': { color: '#2c3e50', icon: 'fa-camera' }
    };

    // Inicializace mapy
    const map = L.map('map', { zoomControl: false }).setView([56.8, -4.2026], 6);
    L.control.zoom({ position: 'bottomright' }).addTo(map);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap',
        maxZoom: 18
    }).addTo(map);

    const markers = L.markerClusterGroup({
        spiderfyOnMaxZoom: true,
        showCoverageOnHover: false,
        zoomToBoundsOnClick: true
    });
    map.addLayer(markers);

    let currentFilteredPhotos = [];
    let currentPhotoIndex = 0;
    
    // Paměť pro aktuálně zvolené filtry
    let activeCategory = 'all';
    let activeYear = 'all';

    // Funkce pro piny (využívá obě podmínky)
    function renderMarkers() {
        markers.clearLayers();
        currentFilteredPhotos = [];
        
        photosData.forEach(photo => {
            // Kontrola shody obou filtrů
            const matchCategory = (activeCategory === 'all' || photo.category === activeCategory);
            // photo.year je číslo, activeYear z data atributu je text, použijeme == místo ===
            const matchYear = (activeYear === 'all' || photo.year == activeYear); 

            if (matchCategory && matchYear) {
                currentFilteredPhotos.push(photo);
                const currentIndex = currentFilteredPhotos.length - 1;
                const conf = catConfig[photo.category] || catConfig['default'];
                
                const customIcon = L.divIcon({
                    className: 'custom-pin',
                    html: `<div class="pin-body" style="--pin-color: ${conf.color};"><i class="fa-solid ${conf.icon}"></i></div>`,
                    iconSize: [30, 30], iconAnchor: [15, 30], popupAnchor: [0, -30]
                });

                const marker = L.marker([photo.lat, photo.lon], { icon: customIcon });
                
                let popupContent = `<h4 class="font-bold text-gray-800 text-base">${photo.title}</h4>`;
                
                // Přidání hezkého datumu pod titulek, pokud existuje
                if (photo.date_formatted) {
                    popupContent += `<p class="text-xs text-brand font-semibold mb-2"><i class="fa-regular fa-calendar mr-1"></i>${photo.date_formatted}</p>`;
                }

                if (photo.thumb_url) {
                    popupContent += `<img src="${photo.thumb_url}" onclick="openModal(${currentIndex})" class="w-full rounded-lg mt-1 cursor-pointer hover:opacity-80 transition-opacity">`;
                }
                if (photo.desc) {
                    let shortDesc = photo.desc.length > 50 ? photo.desc.substring(0, 50) + "..." : photo.desc;
                    popupContent += `<p class="text-sm text-gray-500 mt-2">${shortDesc}</p>`;
                }
                marker.bindPopup(popupContent);
                markers.addLayer(marker);
            }
        });
    }

    // --- LOGIKA PRO DROPDOWN MENU A FILTRY ---

    // Otevírání/zavírání menu
    function toggleDropdown(id) {
        const dropdown = document.getElementById(id);
        // Zavře to druhé menu, pokud je otevřené
        if (id === 'catDropdown' && document.getElementById('yearDropdown')) {
            document.getElementById('yearDropdown').classList.add('hidden');
        } else if (id === 'yearDropdown') {
            document.getElementById('catDropdown').classList.add('hidden');
        }
        dropdown.classList.toggle('hidden');
    }

    // Zavření menu po kliknutí kamkoliv jinam na mapu
    document.addEventListener('click', (e) => {
        if (!e.target.closest('.dropdown-container')) {
            document.getElementById('catDropdown')?.classList.add('hidden');
            document.getElementById('yearDropdown')?.classList.add('hidden');
        }
    });

    // Kliknutí na položku v menu Kategorií
    document.querySelectorAll('.cat-filter-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            // Odebere zvýraznění u všech
            document.querySelectorAll('.cat-filter-btn').forEach(b => {
                b.classList.remove('border-accent', 'bg-gray-50', 'dark:bg-gray-800');
                b.classList.add('border-transparent');
            });
            // Přidá zvýraznění kliknutému
            this.classList.remove('border-transparent');
            this.classList.add('border-accent', 'bg-gray-50', 'dark:bg-gray-800');
            
            // Změní text na hlavním tlačítku a zavře menu
            document.getElementById('activeCatLabel').textContent = this.dataset.name;
            document.getElementById('catDropdown').classList.add('hidden');
            
            activeCategory = this.dataset.filter;
            renderMarkers();
        });
    });

    // Kliknutí na položku v menu Roků
    document.querySelectorAll('.year-filter-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            // Odebere zvýraznění u všech
            document.querySelectorAll('.year-filter-btn').forEach(b => {
                b.classList.remove('border-brand', 'dark:border-blue-400', 'bg-gray-50', 'dark:bg-gray-800');
                b.classList.add('border-transparent');
            });
            // Přidá zvýraznění kliknutému
            this.classList.remove('border-transparent');
            this.classList.add('border-brand', 'dark:border-blue-400', 'bg-gray-50', 'dark:bg-gray-800');
            
            // Změní text na hlavním tlačítku a zavře menu
            document.getElementById('activeYearLabel').textContent = this.textContent;
            document.getElementById('yearDropdown').classList.add('hidden');
            
            activeYear = this.dataset.year;
            renderMarkers();
        });
    });

    // Prvotní vykreslení mapy
    renderMarkers();

    
    
    // --- MODAL LOGIKA ---
    const modal = document.getElementById("photoModal");
    const modalImg = document.getElementById("modalImg");
    const modalCaption = document.getElementById("modalCaption");

    function updateModalContent() {
        const photo = currentFilteredPhotos[currentPhotoIndex];
        modalImg.src = photo.full_url;
        let captionHtml = `<h3 class="text-xl font-bold">${photo.title}</h3>`;
        if (photo.desc) captionHtml += `<p class="mt-2 text-gray-300">${photo.desc}</p>`;
        modalCaption.innerHTML = captionHtml;
    }

    function openModal(index) {
        currentPhotoIndex = index;
        updateModalContent();
        modal.classList.remove("hidden");
        modal.classList.add("flex"); // Tailwind způsob pro zobrazení
    }

    function closeModal() {
        modal.classList.add("hidden");
        modal.classList.remove("flex");
    }

    function nextPhoto(e) {
        if (e) e.stopPropagation();
        currentPhotoIndex = (currentPhotoIndex + 1) % currentFilteredPhotos.length;
        updateModalContent();
    }

    function prevPhoto(e) {
        if (e) e.stopPropagation();
        currentPhotoIndex = (currentPhotoIndex - 1 + currentFilteredPhotos.length) % currentFilteredPhotos.length;
        updateModalContent();
    }

    document.addEventListener('keydown', e => {
        if (!modal.classList.contains("hidden")) {
            if (e.key === "Escape") closeModal();
            if (e.key === "ArrowRight") nextPhoto();
            if (e.key === "ArrowLeft") prevPhoto();
        }
    });
</script>
{% endblock %}
